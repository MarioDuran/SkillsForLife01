<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Mundo de Wumpus</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.292.0"
    }
  }
  </script>
</head>
<body class="bg-[#1B1B1E]">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Skull, Wind, Navigation, Hand, Play, Square as BoxSquare,
      AlertCircle, Trophy, RefreshCw, Code, ArrowUp, ArrowDown,
      ArrowLeft, ArrowRight, Sword, Sparkles
    } from 'lucide-react';

    // --- SISTEMA DE SONIDO RETRO (WEB AUDIO API) ---
    let audioCtx = null;
    const playSound = (type) => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;

      switch(type) {
        case 'move':
          osc.type = 'sine';
          osc.frequency.setValueAtTime(300, now);
          osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);
          gainNode.gain.setValueAtTime(0.05, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
          break;
        case 'wumpus': // Rugido grave (Muerte)
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(100, now);
          osc.frequency.linearRampToValueAtTime(30, now + 0.6);
          gainNode.gain.setValueAtTime(0.3, now);
          gainNode.gain.linearRampToValueAtTime(0.01, now + 0.6);
          osc.start(now);
          osc.stop(now + 0.6);
          break;
        case 'scream': // Grito agudo (Wumpus asesinado)
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(800, now);
          osc.frequency.exponentialRampToValueAtTime(100, now + 0.8);
          gainNode.gain.setValueAtTime(0.3, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
          osc.start(now);
          osc.stop(now + 0.8);
          break;
        case 'pit': // Caída
          osc.type = 'square';
          osc.frequency.setValueAtTime(400, now);
          osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
          gainNode.gain.setValueAtTime(0.1, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
          osc.start(now);
          osc.stop(now + 0.5);
          break;
        case 'gold': // Brillo agudo
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, now);
          osc.frequency.setValueAtTime(1200, now + 0.1);
          gainNode.gain.setValueAtTime(0.1, now);
          gainNode.gain.linearRampToValueAtTime(0.01, now + 0.4);
          osc.start(now);
          osc.stop(now + 0.4);
          break;
        case 'attack': // Zumbido de espada
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(200, now);
          osc.frequency.linearRampToValueAtTime(800, now + 0.15);
          gainNode.gain.setValueAtTime(0.2, now);
          gainNode.gain.linearRampToValueAtTime(0.01, now + 0.15);
          osc.start(now);
          osc.stop(now + 0.15);
          break;
        case 'bump': // Golpe sordo
          osc.type = 'square';
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
          gainNode.gain.setValueAtTime(0.15, now);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          osc.start(now);
          osc.stop(now + 0.1);
          break;
      }
    };

    const COLORS = {
      bgMain: '#1B1B1E', panel: '#464849', dark: '#27272B', lightText: '#CBC9C2',
      accentWarm: '#F3DA4B', accentStrong: '#F9E40B', accentCold: '#2D473B',
      olive: '#606C43', softOlive: '#898B4B'
    };

    const SIZE = 5;
    const DIRS = [
      { dx: 0, dy: 1, label: 'Norte', rot: -90 },
      { dx: 1, dy: 0, label: 'Este', rot: 0 },   
      { dx: 0, dy: -1, label: 'Sur', rot: 90 },  
      { dx: -1, dy: 0, label: 'Oeste', rot: 180 }
    ];

    const LEVELS = [
      { wumpus: {x: 0, y: 4}, gold: {x: 2, y: 2}, pits: [{x: 4, y: 0}, {x: 4, y: 4}] },
      { wumpus: {x: 2, y: 0}, gold: {x: 4, y: 0}, pits: [{x: 0, y: 3}, {x: 4, y: 4}] },
      { wumpus: {x: 0, y: 4}, gold: {x: 4, y: 4}, pits: [{x: 3, y: 0}, {x: 0, y: 3}, {x: 4, y: 1}, {x: 1, y: 4}] },
      { wumpus: {x: 3, y: 3}, gold: {x: 4, y: 4}, pits: [{x: 3, y: 0}, {x: 3, y: 1}, {x: 0, y: 3}, {x: 2, y: 4}] },
      { wumpus: {x: 2, y: 2}, gold: {x: 4, y: 2}, pits: [{x: 2, y: 0}, {x: 0, y: 3}, {x: 2, y: 4}, {x: 4, y: 4}] }
    ];

    const DEFAULT_PYTHON_CODE = `def decide_action(breeze, stench, glitter, wall):
    
    return random.choice(["FORWARD", "LEFT", "RIGHT"])
`;

    function WumpusWorld() {
      const [board, setBoard] = useState([]);
      const [agent, setAgent] = useState({ x: 0, y: 0, dir: 1, hasGold: false, hasArrow: true });
      const [score, setScore] = useState(100);
      const [status, setStatus] = useState('playing'); 
      const [logs, setLogs] = useState([]);
      const [mode, setMode] = useState('manual');
      const [currentLevel, setCurrentLevel] = useState(0);
      const [perceptions, setPerceptions] = useState({ breeze: false, stench: false, glitter: false, wall: false });
      
      const [pyodide, setPyodide] = useState(null);
      const [pyCode, setPyCode] = useState(DEFAULT_PYTHON_CODE);
      const [isAutoPlaying, setIsAutoPlaying] = useState(false);
      const [isLoadingPy, setIsLoadingPy] = useState(true);

      const initGame = (levelIdx = currentLevel, startScore = 100) => {
        const config = LEVELS[levelIdx];
        let newBoard = Array(SIZE).fill(null).map(() => Array(SIZE).fill(null).map(() => ({
          hasWumpus: false, hasPit: false, hasGold: false,
          isVisited: false, isBreezy: false, isStinky: false
        })));

        newBoard[config.wumpus.y][config.wumpus.x].hasWumpus = true;
        newBoard[config.gold.y][config.gold.x].hasGold = true;
        config.pits.forEach(p => newBoard[p.y][p.x].hasPit = true);

        for (let y = 0; y < SIZE; y++) {
          for (let x = 0; x < SIZE; x++) {
            const neighbors = [
              { nx: x, ny: y + 1 }, { nx: x + 1, ny: y },
              { nx: x, ny: y - 1 }, { nx: x - 1, ny: y }
            ];
            neighbors.forEach(({ nx, ny }) => {
              if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) {
                if (newBoard[ny][nx].hasWumpus) newBoard[y][x].isStinky = true;
                if (newBoard[ny][nx].hasPit) newBoard[y][x].isBreezy = true;
              }
            });
          }
        }

        newBoard[0][0].isVisited = true;
        setBoard(newBoard);
        setCurrentLevel(levelIdx);
        setScore(startScore);
        setAgent({ x: 0, y: 0, dir: 1, hasGold: false, hasArrow: true });
        setStatus('playing');
        setLogs([`Nivel ${levelIdx + 1} iniciado. Te encuentras en la entrada (1,1).`]);
        setIsAutoPlaying(false);
        updatePerceptions(0, 0, 1, newBoard);
      };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (mode !== 'manual' || status !== 'playing') return;
          
          let handled = true;
          switch(e.key) {
            case 'ArrowUp': handleAction('MOVE_TO', 0); break;
            case 'ArrowRight': handleAction('MOVE_TO', 1); break;
            case 'ArrowDown': handleAction('MOVE_TO', 2); break;
            case 'ArrowLeft': handleAction('MOVE_TO', 3); break;
            case 'a': case 'A': handleAction('ATTACK'); break;
            case 's': case 'S': handleAction('GRAB'); break;
            default: handled = false;
          }
          if (handled) e.preventDefault();
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [mode, status, agent, board, currentLevel, score]);

      useEffect(() => {
        initGame(0, 100);
        const loadPy = async () => {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js';
          script.onload = async () => {
            const py = await window.loadPyodide();
            setPyodide(py);
            setIsLoadingPy(false);
          };
          document.body.appendChild(script);
        };
        loadPy();
      }, []);

      const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 50));

      const updatePerceptions = (x, y, dir, currentBoard) => {
        const frontX = x + DIRS[dir].dx;
        const frontY = y + DIRS[dir].dy;
        const isWall = frontX < 0 || frontX >= SIZE || frontY < 0 || frontY >= SIZE;
        
        // Glitter detecta si hay oro enfrente
        const isFrontGold = !isWall && currentBoard[frontY][frontX].hasGold;

        setPerceptions({
          breeze: currentBoard[y][x].isBreezy,
          stench: currentBoard[y][x].isStinky,
          glitter: isFrontGold,
          wall: isWall
        });
      };

      const handleAction = (actionStr, extraParam = null) => {
        if (status !== 'playing') return;

        let { x, y, dir, hasGold, hasArrow } = agent;
        let newBoard = [...board];
        let newStatus = 'playing';
        let newScore = score - 1; 

        if (actionStr === 'MOVE_TO') {
          dir = extraParam;
          actionStr = 'FORWARD'; 
        }

        switch (actionStr) {
          case 'FORWARD':
            const nx = x + DIRS[dir].dx;
            const ny = y + DIRS[dir].dy;
            if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) {
              x = nx;
              y = ny;
              newBoard[y][x].isVisited = true;
              addLog(`Avanzaste hacia el ${DIRS[dir].label} a (${x+1},${y+1}).`);
              
              if (newBoard[y][x].hasWumpus) {
                newStatus = 'died-wumpus';
                addLog('¡Oh no! Has sido devorado por el Wumpus.');
                playSound('wumpus');
              } else if (newBoard[y][x].hasPit) {
                newStatus = 'died-pit';
                addLog('¡Ahhh! Caíste en un pozo sin fondo.');
                playSound('pit');
              } else if (x === 0 && y === 0 && hasGold) {
                newStatus = 'won';
                addLog('¡VICTORIA! Lograste salir por la escalera con el oro.');
                playSound('gold');
              } else {
                playSound('move');
              }
            } else {
              addLog('¡Ouch! Chocaste con la pared. (-1 pt)');
              playSound('bump');
            }
            break;
          case 'LEFT':
            dir = (dir + 3) % 4;
            addLog('Giraste a la izquierda.');
            playSound('move');
            break;
          case 'RIGHT':
            dir = (dir + 1) % 4;
            addLog('Giraste a la derecha.');
            playSound('move');
            break;
          case 'GRAB':
            let grabX = x + DIRS[dir].dx;
            let grabY = y + DIRS[dir].dy;
            
            // Revisa si hay oro enfrente (acorde a la percepción de Glitter)
            if (grabX >= 0 && grabX < SIZE && grabY >= 0 && grabY < SIZE && newBoard[grabY][grabX].hasGold) {
              hasGold = true;
              newBoard[grabY][grabX].hasGold = false;
              newScore += 100;
              addLog('¡Agarraste el lingote de enfrente! (+100 pts) (S) Ahora regresa a la escalera en (1,1).');
              playSound('gold');
            } else if (newBoard[y][x].hasGold) { // Fallback por si lo pisan
              hasGold = true;
              newBoard[y][x].hasGold = false;
              newScore += 100;
              addLog('¡Agarraste el lingote! (+100 pts) (S) Ahora regresa a la escalera en (1,1).');
              playSound('gold');
            } else {
              addLog('Intentaste agarrar algo, pero no hay nada aquí ni enfrente. (-1 pt)');
              playSound('bump');
            }
            break;
          case 'ATTACK':
            if (hasArrow) {
              hasArrow = false;
              addLog('¡Diste un poderoso espadazo mágico! (A)');
              playSound('attack');
              let tx = x + DIRS[dir].dx;
              let ty = y + DIRS[dir].dy;
              let hit = false;
              while (tx >= 0 && tx < SIZE && ty >= 0 && ty < SIZE) {
                if (newBoard[ty][tx].hasWumpus) {
                  hit = true;
                  newBoard[ty][tx].hasWumpus = false;
                  for (let ry = 0; ry < SIZE; ry++) {
                    for (let rx = 0; rx < SIZE; rx++) {
                      newBoard[ry][rx].isStinky = false;
                    }
                  }
                  break;
                }
                tx += DIRS[dir].dx;
                ty += DIRS[dir].dy;
              }
              if (hit) {
                newScore += 50;
                addLog('¡Escuchaste un grito aterrador! (+50 pts) Tu espada destruyó al Wumpus.');
                playSound('scream');
              } else {
                addLog('Silencio... el rayo de tu espada no golpeó nada.');
              }
            } else {
              addLog('Tu espada se ha quedado sin poder mágico. (-1 pt)');
              playSound('bump');
            }
            break;
          default:
            addLog(`Acción desconocida: ${actionStr}`);
        }

        setScore(newScore);
        setAgent({ x, y, dir, hasGold, hasArrow });
        setBoard(newBoard);
        setStatus(newStatus);
        updatePerceptions(x, y, dir, newBoard);

        if (newStatus !== 'playing') {
          setIsAutoPlaying(false);
        }
      };

      const executePythonStep = async () => {
        if (!pyodide || status !== 'playing') return;
        try {
          await pyodide.runPythonAsync(`import random\n${pyCode}`);
          const callStr = `decide_action(${perceptions.breeze ? 'True' : 'False'}, ${perceptions.stench ? 'True' : 'False'}, ${perceptions.glitter ? 'True' : 'False'}, ${perceptions.wall ? 'True' : 'False'})`;
          const action = await pyodide.runPythonAsync(callStr);
          
          if (typeof action === 'string') {
            // Protección contra espacios en blanco y mayúsculas
            handleAction(action.trim().toUpperCase());
          } else {
            addLog('Error: El script no devolvió un string ("FORWARD", "LEFT", etc).');
            setIsAutoPlaying(false);
          }
        } catch (err) {
          addLog(`Error en Python: ${err.message.split('\n').pop()}`);
          setIsAutoPlaying(false);
        }
      };

      useEffect(() => {
        let timer;
        if (isAutoPlaying && status === 'playing') {
          timer = setTimeout(() => {
            executePythonStep();
          }, 600);
        }
        return () => clearTimeout(timer);
      }, [isAutoPlaying, agent, status]);

      return (
        <div style={{ backgroundColor: COLORS.bgMain, color: COLORS.lightText }} className="min-h-screen font-sans p-6 selection:bg-[#F3DA4B] selection:text-[#1B1B1E]">
          <header className="max-w-[95%] 2xl:max-w-[1600px] mx-auto flex flex-col md:flex-row items-center justify-between mb-8 border-b border-[#464849] pb-4 gap-4">
            <div className="flex items-center gap-3">
              <Skull size={32} style={{ color: COLORS.accentStrong }} />
              <h1 style={{ color: COLORS.accentWarm }} className="text-2xl md:text-3xl font-bold tracking-wider text-center md:text-left">
                EL MUNDO DE WUMPUS - NIVEL {currentLevel + 1}
              </h1>
            </div>
            
            <div className="flex items-center gap-6">
              <div className="flex items-center gap-2 bg-[#27272B] px-4 py-2 rounded-xl border border-[#464849] shadow-inner">
                <span className="text-xs font-bold text-[#CBC9C2] uppercase tracking-wider">Score</span>
                <span className={`text-2xl font-black ${score < 0 ? 'text-red-400' : 'text-[#F9E40B]'}`}>{score}</span>
              </div>
              <div className="flex gap-2">
                <button onClick={() => initGame(currentLevel, 100)} style={{ backgroundColor: COLORS.panel }} className="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-[#606C43] transition-colors font-semibold">
                  <RefreshCw size={18} /> Reiniciar Nivel
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-[95%] 2xl:max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <section className="lg:col-span-7 flex flex-col gap-4 items-center">
              
              <div style={{ backgroundColor: COLORS.panel }} className="p-4 md:p-6 rounded-2xl shadow-2xl relative w-full max-w-[65vh]">
                {status !== 'playing' && (
                  <div className="absolute inset-0 z-30 bg-[#1B1B1E]/60 backdrop-blur-sm rounded-2xl flex flex-col items-center justify-center transition-all duration-500">
                    {status === 'won' ? (
                      <>
                        <Trophy size={64} style={{ color: COLORS.accentStrong }} className="mb-4 animate-bounce" />
                        <h2 style={{ color: COLORS.accentWarm }} className="text-4xl font-bold text-center px-4 mb-2">¡HAS ESCAPADO!</h2>
                        <p className="text-xl font-mono text-white mb-6">Puntaje Final: {score}</p>
                        {currentLevel < LEVELS.length - 1 ? (
                          <button onClick={() => initGame(currentLevel + 1, score)} style={{ backgroundColor: COLORS.accentCold }} className="mt-2 px-8 py-4 rounded-xl shadow-lg hover:bg-[#606C43] transition-colors text-white font-bold text-lg">Avanzar al Nivel {currentLevel + 2}</button>
                        ) : (
                          <div className="mt-4 text-center">
                            <p className="text-xl font-bold text-green-400 mb-4">¡JUEGO COMPLETADO!</p>
                            <button onClick={() => initGame(0, 100)} style={{ backgroundColor: COLORS.accentCold }} className="px-6 py-3 rounded-lg hover:bg-[#606C43] transition-colors text-white font-bold">Jugar de Nuevo</button>
                          </div>
                        )}
                      </>
                    ) : (
                      <>
                        <Skull size={64} className="text-red-500 mb-4 animate-pulse" />
                        <h2 className="text-red-400 text-4xl font-bold mb-2">HAS MUERTO</h2>
                        <p className="text-lg font-mono text-white mb-6">Puntaje Final: {score}</p>
                        <button onClick={() => initGame(currentLevel, 100)} style={{ backgroundColor: COLORS.accentCold }} className="mt-2 px-8 py-4 rounded-xl shadow-lg hover:bg-[#606C43] transition-colors text-white font-bold text-lg">Reintentar Nivel</button>
                      </>
                    )}
                  </div>
                )}

                <div className="grid grid-rows-5 gap-2 aspect-square">
                  {[4, 3, 2, 1, 0].map(y => (
                    <div key={`row-${y}`} className="grid grid-cols-5 gap-2">
                      {[0, 1, 2, 3, 4].map(x => {
                        const cell = board[y] ? board[y][x] : null;
                        if (!cell) return null;
                        const isAgentHere = agent.x === x && agent.y === y;
                        const isExit = x === 0 && y === 0;
                        const showContent = cell.isVisited || status !== 'playing';

                        return (
                          <div key={`${x}-${y}`} style={{ backgroundColor: cell.isVisited ? COLORS.panel : COLORS.dark }} className={`relative rounded-xl border-2 flex items-center justify-center overflow-hidden ${isAgentHere && status === 'playing' ? 'border-[#F9E40B]' : 'border-transparent'} ${!cell.isVisited ? 'opacity-80' : 'shadow-inner'}`}>
                            {isExit && (
                              <svg viewBox="0 0 24 24" className="w-[60%] h-[60%] opacity-20 absolute z-0" stroke="#CBC9C2" strokeWidth="2" strokeLinecap="round">
                                <line x1="7" y1="2" x2="7" y2="22" />
                                <line x1="17" y1="2" x2="17" y2="22" />
                                <line x1="7" y1="6" x2="17" y2="6" />
                                <line x1="7" y1="12" x2="17" y2="12" />
                                <line x1="7" y1="18" x2="17" y2="18" />
                              </svg>
                            )}

                            {showContent && (
                              <div className="absolute inset-0 flex flex-wrap items-center justify-center gap-1 opacity-50 z-10">
                                {cell.hasPit && <div className="w-full h-full bg-black/60 absolute" />}
                                {cell.hasWumpus && !isAgentHere && <Skull size={32} className="text-red-500 drop-shadow-md" />}
                                {cell.hasGold && (
                                  <svg viewBox="0 0 24 24" className="w-10 h-10 drop-shadow-[0_0_8px_rgba(249,228,11,0.8)] animate-pulse z-10">
                                    <polygon points="6,9 18,9 21,14 3,14" fill="#F9E40B" stroke="#D9C40B" strokeWidth="1"/>
                                    <polygon points="3,14 21,14 21,17 3,17" fill="#D9C40B" stroke="#A69508" strokeWidth="1"/>
                                    <polygon points="5,14 19,14 17,10 7,10" fill="#FFF275" opacity="0.6" />
                                  </svg>
                                )}
                              </div>
                            )}
                            
                            {isAgentHere && (
                              <div className="absolute inset-0 z-20 flex items-center justify-center">
                                {status === 'died-wumpus' && <WumpusMonster />}
                                {status === 'died-pit' && <FallingKnight />}
                                {status === 'playing' && <HeroKnight dir={agent.dir} />}
                              </div>
                            )}
                            <span className="absolute bottom-1 right-1 text-[10px] font-bold opacity-30 z-30">{x+1},{y+1}</span>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ backgroundColor: COLORS.dark }} className="p-4 rounded-xl flex justify-between items-center gap-2 w-full max-w-[65vh]">
                <PerceptionBadge active={perceptions.stench} icon={<Skull size={18} />} label="Stench" color="text-red-400" />
                <PerceptionBadge active={perceptions.breeze} icon={<Wind size={18} />} label="Breeze" color="text-blue-400" />
                <PerceptionBadge active={perceptions.glitter} icon={<Sparkles size={18} />} label="Glitter" color="text-yellow-400" />
                <PerceptionBadge active={perceptions.wall} icon={<BoxSquare size={18} />} label="Wall" color="text-orange-400" />
              </div>
            </section>

            <section className="lg:col-span-5 flex flex-col gap-4 h-full">
              <div className="flex rounded-xl overflow-hidden" style={{ backgroundColor: COLORS.dark }}>
                <button onClick={() => { setMode('manual'); setIsAutoPlaying(false); }} style={{ backgroundColor: mode === 'manual' ? COLORS.panel : 'transparent' }} className={`flex-1 py-3 font-bold transition-colors flex justify-center items-center gap-2 ${mode === 'manual' ? `text-[${COLORS.accentWarm}]` : ''}`}><Hand size={18} /> Modo Manual</button>
                <button onClick={() => setMode('code')} style={{ backgroundColor: mode === 'code' ? COLORS.panel : 'transparent' }} className={`flex-1 py-3 font-bold transition-colors flex justify-center items-center gap-2 ${mode === 'code' ? `text-[${COLORS.accentWarm}]` : ''}`}><Code size={18} /> Modo Código</button>
              </div>

              <div style={{ backgroundColor: COLORS.panel }} className="p-5 rounded-2xl shadow-lg flex-1 flex flex-col min-h-[350px]">
                {mode === 'manual' && (
                  <div className="flex flex-col items-center justify-center flex-1 py-8 gap-6">
                    <p className="text-xs text-center opacity-60 bg-[#27272B] px-4 py-2 rounded-lg">
                      Usa las <b>flechas del teclado</b> para moverte,<br/> <b>A</b> para Espadazo y <b>S</b> para Agarrar Oro.
                    </p>
                    <div className="grid grid-cols-3 gap-3">
                      <div />
                      <GameButton onClick={() => handleAction('MOVE_TO', 0)} icon={<ArrowUp />} label="Arriba" />
                      <div />
                      <GameButton onClick={() => handleAction('MOVE_TO', 3)} icon={<ArrowLeft />} label="Izquierda" />
                      <GameButton onClick={() => handleAction('MOVE_TO', 2)} icon={<ArrowDown />} label="Abajo" />
                      <GameButton onClick={() => handleAction('MOVE_TO', 1)} icon={<ArrowRight />} label="Derecha" />
                    </div>
                    <div className="grid grid-cols-2 gap-4 w-full max-w-[280px]">
                      <GameButton onClick={() => handleAction('ATTACK')} icon={<Sword />} label="Espadazo (A)" color={COLORS.accentCold} width="w-full" />
                      <GameButton onClick={() => handleAction('GRAB')} icon={<Hand />} label="Agarrar (S)" color={COLORS.olive} width="w-full" />
                    </div>
                    <div className="text-sm opacity-70 mt-2 text-center">Magia de espada: {agent.hasArrow ? '1/1' : '0/1'}<br/>Oro obtenido: {agent.hasGold ? 'Sí' : 'No'}</div>
                  </div>
                )}

                {mode === 'code' && (
                  <div className="flex flex-col flex-1 h-full gap-3">
                    {isLoadingPy ? (
                      <div className="flex-1 flex flex-col items-center justify-center opacity-70">
                        <RefreshCw className="animate-spin mb-3" size={32} style={{ color: COLORS.accentWarm }}/>
                        <p>Cargando motor Python (Pyodide)...</p>
                      </div>
                    ) : (
                      <>
                        <div className="text-xs opacity-80 bg-[#27272B] px-4 py-3 rounded-lg border border-[#464849]">
                          <p className="font-bold mb-1" style={{ color: COLORS.accentWarm }}>Instrucciones del Agente:</p>
                          <p className="mb-2">Define la función en inglés. Se penaliza con -1 pto cada paso.</p>
                        </div>
                        <textarea value={pyCode} onChange={(e) => setPyCode(e.target.value)} spellCheck="false" style={{ backgroundColor: COLORS.dark, color: '#e5e5e5' }} className="w-full flex-1 rounded-xl p-4 font-mono text-[13px] leading-relaxed resize-none focus:outline-none focus:ring-2 focus:ring-[#F3DA4B] min-h-[150px]" />
                        <div className="flex gap-2">
                          {!isAutoPlaying ? (
                            <button onClick={() => setIsAutoPlaying(true)} disabled={status !== 'playing'} style={{ backgroundColor: COLORS.accentCold }} className="flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-[#606C43] transition-colors disabled:opacity-50"><Play size={18} /> Auto</button>
                          ) : (
                            <button onClick={() => setIsAutoPlaying(false)} className="flex-1 py-3 rounded-lg font-bold flex items-center justify-center gap-2 bg-red-800 hover:bg-red-700 transition-colors"><Square size={18} /> Detener</button>
                          )}
                          <button onClick={executePythonStep} disabled={isAutoPlaying || status !== 'playing'} style={{ backgroundColor: COLORS.olive }} className="px-4 py-3 rounded-lg font-bold flex items-center justify-center hover:brightness-110 transition-all disabled:opacity-50">Paso</button>
                        </div>
                      </>
                    )}
                  </div>
                )}
              </div>

              <div style={{ backgroundColor: COLORS.dark }} className="h-48 rounded-xl p-4 overflow-y-auto flex flex-col gap-1 text-sm font-mono relative">
                <h3 style={{ color: COLORS.softOlive }} className="sticky top-0 bg-[#27272B] pb-2 mb-2 border-b border-[#464849] font-bold z-10">Consola de Eventos</h3>
                {logs.map((log, i) => (
                  <div key={i} className={`opacity-${Math.max(20, 100 - i * 15)} ${i===0 ? 'text-[#F3DA4B]' : ''}`}><span className="opacity-50 mr-2">►</span>{log}</div>
                ))}
              </div>
            </section>
          </main>
        </div>
      );
    }

    function GameButton({ onClick, icon, label, color = '#27272B', width = 'w-16' }) {
      return (
        <button onClick={onClick} style={{ backgroundColor: color }} className={`${width} h-16 rounded-xl flex flex-col items-center justify-center gap-1 hover:brightness-125 transition-all shadow-md active:scale-95`}>
          {icon}
          <span className="text-[10px] font-bold uppercase tracking-wider opacity-80">{label}</span>
        </button>
      );
    }

    function PerceptionBadge({ active, icon, label, color }) {
      return (
        <div className={`flex flex-col items-center gap-1 transition-all duration-300 ${active ? `opacity-100 ${color} drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]` : 'opacity-20 grayscale'}`}>
          <div className={`p-2 rounded-full ${active ? 'bg-[#464849]' : ''}`}>{icon}</div>
          <span className="text-[10px] uppercase font-bold text-center leading-tight">{label}</span>
        </div>
      );
    }

    function HeroKnight({ dir }) {
      const DIRS = [{ rot: -90 }, { rot: 0 }, { rot: 90 }, { rot: 180 }];
      const rotation = DIRS[dir].rot;
      return (
        <svg viewBox="0 0 40 40" className="w-[80%] h-[80%] drop-shadow-xl z-20" style={{ transform: `rotate(${rotation}deg)`, transition: 'transform 0.2s ease-out' }}>
          <polygon points="12,15 2,20 12,25" fill="#2D473B" />
          <path d="M 12 4 L 20 4 L 20 9 Q 16 15 12 9 Z" fill="#464849" stroke="#CBC9C2" strokeWidth="1.5" />
          <rect x="16" y="27" width="20" height="3" fill="#CBC9C2" />
          <rect x="18" y="24" width="3" height="9" fill="#27272B" />
          <circle cx="18" cy="28.5" r="1.5" fill="#F9E40B" />
          <rect x="12" y="14" width="10" height="12" rx="2" fill="#464849" />
          <circle cx="15" cy="13" r="4" fill="#CBC9C2" />
          <circle cx="15" cy="27" r="4" fill="#CBC9C2" />
          <rect x="18" y="15" width="8" height="10" rx="3" fill="#CBC9C2" />
          <rect x="22" y="18" width="4" height="4" fill="#1B1B1E" />
          <rect x="20" y="19" width="6" height="2" fill="#1B1B1E" />
        </svg>
      );
    }

    function FallingKnight() {
      return (
        <div className="absolute inset-0 flex items-center justify-center">
          <div className="absolute w-[80%] h-[80%] bg-black rounded-full z-10 shadow-inner"></div>
          <div className="w-[80%] h-[80%] relative z-20 flex items-center justify-center animate-[pitFall_0.8s_ease-in-out_forwards]">
            <HeroKnight dir={2} /> 
            <style>{`
              @keyframes pitFall {
                0% { transform: scale(1) rotate(0deg); opacity: 1; }
                20% { transform: scale(1.1) rotate(10deg); opacity: 1; }
                100% { transform: scale(0.1) rotate(360deg); opacity: 0; }
              }
            `}</style>
          </div>
        </div>
      );
    }

    function WumpusMonster() {
      return (
        <svg viewBox="0 0 40 40" className="w-[90%] h-[90%] drop-shadow-2xl animate-bounce z-30 relative">
          <path d="M 5 30 C 5 10, 35 10, 35 30 Z" fill="#7f1d1d" />
          <circle cx="14" cy="20" r="4" fill="#fef08a" />
          <circle cx="26" cy="20" r="4" fill="#fef08a" />
          <circle cx="14" cy="20" r="2" fill="#000" />
          <circle cx="26" cy="20" r="2" fill="#000" />
          <path d="M 10 26 Q 20 32 30 26" stroke="#450a0a" strokeWidth="2" fill="none" />
          <polygon points="12,27 15,31 18,28" fill="#fff" />
          <polygon points="22,28 25,31 28,27" fill="#fff" />
          <path d="M 8 12 Q 14 5 20 10 Q 26 5 32 12" stroke="#450a0a" strokeWidth="3" fill="none"/>
        </svg>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<WumpusWorld />);
  </script>
</body>
</html>
